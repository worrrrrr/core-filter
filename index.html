<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Filter | Analysis Report</title>
    <style>
        /* CSS เดิมของ Admin ทั้งหมด */
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #app { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 6px; color: #fff; margin-bottom: 5px; }
        h2 { font-size: 1.1rem; font-weight: 300; line-height: 1.6; margin-bottom: 30px; text-align: left; color: #ccc; }
        .header-text { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; text-align: center; }
        #options { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn { display: block; width: 100%; padding: 20px; background: #000; border: 1px solid #333; color: #888; font-size: 1rem; cursor: pointer; border-radius: 4px; text-align: left; transition: all 0.3s ease; line-height: 1.4; }
        .btn:hover { border-color: #bb86fc; color: #fff; background: #0a0a0a; transform: translateX(5px); }
        .hidden { display: none; }
        #result-screen { border-top: 1px solid #333; padding-top: 40px; margin-top: 20px; }
        .type-tag { font-size: 3.5rem; color: #bb86fc; font-weight: 200; letter-spacing: 10px; margin: 20px 0; }
        .analysis-box { font-size: 1.05rem; color: #aaa; line-height: 1.8; text-align: left; font-weight: 300; border-left: 2px solid #bb86fc; padding-left: 20px; }
        .restart-btn { margin-top: 50px; background: transparent; border: 1px solid #222; color: #444; padding: 10px 20px; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .restart-btn:hover { color: #fff; border-color: #444; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <h1>CORE FILTER</h1>
        <div class="header-text" style="color:#333">Objective Personality Analysis</div>
        <button class="btn" style="text-align:center; margin-top:30px;" onclick="startQuiz()">เริ่มการวิเคราะห์ (12 ค่าน้ำหนัก)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header-text" id="q-progress">ANALYZING STEP 1 OF 12</div>
        <h2 id="q-text">คำถามจะขึ้นตรงนี้</h2>
        <div id="options">
            <button class="btn" onclick="handleAnswer('A')" id="optA">Option A</button>
            <button class="btn" onclick="handleAnswer('B')" id="optB">Option B</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="header-text">Final Analysis Report</div>
        <div id="res-type" class="type-tag">TYPE</div>
        <div id="res-roast" class="analysis-box"></div>
