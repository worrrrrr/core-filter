<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Filter | Analysis Report</title>
    <style>
        /* CSS เดิมของ Admin ทั้งหมด */
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #app { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 6px; color: #fff; margin-bottom: 5px; }
        h2 { font-size: 1.1rem; font-weight: 300; line-height: 1.6; margin-bottom: 30px; text-align: left; color: #ccc; }
        .header-text { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; text-align: center; }
        #options { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn { display: block; width: 100%; padding: 20px; background: #000; border: 1px solid #333; color: #888; font-size: 1rem; cursor: pointer; border-radius: 4px; text-align: left; transition: all 0.3s ease; line-height: 1.4; }
        .btn:hover { border-color: #bb86fc; color: #fff; background: #0a0a0a; transform: translateX(5px); }
        .hidden { display: none; }
        #result-screen { border-top: 1px solid #333; padding-top: 40px; margin-top: 20px; }
        .type-tag { font-size: 3.5rem; color: #bb86fc; font-weight: 200; letter-spacing: 10px; margin: 20px 0; }
        .analysis-box { font-size: 1.05rem; color: #aaa; line-height: 1.8; text-align: left; font-weight: 300; border-left: 2px solid #bb86fc; padding-left: 20px; }
        .restart-btn { margin-top: 50px; background: transparent; border: 1px solid #222; color: #444; padding: 10px 20px; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .restart-btn:hover { color: #fff; border-color: #444; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <h1>CORE FILTER</h1>
        <div class="header-text" style="color:#333">Objective Personality Analysis</div>
        <button class="btn" style="text-align:center; margin-top:30px;" onclick="startQuiz()">เริ่มการวิเคราะห์ (12 ค่าน้ำหนัก)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header-text" id="q-progress">ANALYZING STEP 1 OF 12</div>
        <h2 id="q-text">คำถามจะขึ้นตรงนี้</h2>
        <div id="options">
            <button class="btn" onclick="handleAnswer('A')" id="optA">Option A</button>
            <button class="btn" onclick="handleAnswer('B')" id="optB">Option B</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="header-text">Final Analysis Report</div>
        <div id="res-type" class="type-tag">TYPE</div>
        <div id="res-roast" class="analysis-box"></div>
        <button class="restart-btn" onclick="location.reload()">TERMINATE & RESTART</button>
    </div>
</div>

<script>
    // ชุดคำถามแบบ "คลีน" ไม่มีวงเล็บ
    const allQuestions = [
        { q: "เมื่อเผชิญกับสถานการณ์ที่ไม่คาดคิด คุณตอบสนองอย่างไร?", a: "ใช้สัญชาตญาณมองหาภาพรวม", b: "ใช้ข้อมูลจากสิ่งที่เคยเกิดขึ้นจริง", axis: "NS" },
        { q: "คุณให้ความสำคัญกับสิ่งใดมากกว่าในการทำงาน?", a: "ตรรกะและความถูกต้องของระบบ", b: "ความพึงพอใจและรักษาความสัมพันธ์", axis: "TF" },
        { q: "วิธีการรับพลังงานของคุณคือการ...", a: "ปฏิสัมพันธ์กับสิ่งแวดล้อมภายนอก", b: "สะท้อนความคิดอยู่ภายในตนเอง", axis: "EI" },
        { q: "รูปแบบการใช้ชีวิตที่คุณเป็นอยู่...", a: "เน้นการวางโครงสร้างและขอบเขต", b: "เน้นการเปิดรับและความยืดหยุ่น", axis: "JP" },
        { q: "ในการแก้ไขปัญหาวิกฤต คุณเชื่อมั่นใน...", a: "ไอเดียใหม่ที่ยังไม่เคยถูกใช้", b: "วิธีการที่พิสูจน์แล้วว่าได้ผล", axis: "NS" },
        { q: "การตัดสินใจของคุณมักจะออกมาในรูปแบบ...", a: "เด็ดขาดและตรงไปตรงมา", b: "ประนีประนอมและนุ่มนวล", axis: "TF" },
        { q: "ในวงสนทนา คุณเลือกที่จะ...", a: "แสดงออกทันทีที่คิด", b: "คิดทบทวนก่อนจะพูด", axis: "EI" },
        { q: "ระเบียบวินัยสำหรับคุณคืออะไร?", a: "สิ่งที่ต้องยึดถือเพื่อความสำเร็จ", b: "สิ่งที่ปรับเปลี่ยนได้ตามสถานการณ์", axis: "JP" },
        { q: "คุณมักจะจดจำสิ่งใดได้แม่นยำกว่า?", a: "ใจความสำคัญและความหมาย", b: "ลำดับเหตุการณ์และรายละเอียด", axis: "NS" },
        { q: "เมื่อได้รับคำวิจารณ์ คุณมีแนวโน้มจะ...", a: "พิจารณาตามข้อเท็จจริง", b: "สะเทือนถึงความรู้สึกส่วนตัว", axis: "TF" },
        { q: "สังคมที่ตอบโจทย์ไลฟ์สไตล์คุณคือ...", a: "กลุ่มที่เต็มไปด้วยกิจกรรม", b: "กลุ่มเล็กๆ ที่พูดคุยเชิงลึก", axis: "EI" },
        { q: "แผนการเดินทางของคุณมักจะเป็นแบบไหน?", a: "กำหนดจุดแวะพักชัดเจน", b: "ไปถึงที่นั่นแล้วค่อยว่ากัน", axis: "JP" }
    ];

    let current = 0;
    let scores = { E:0, I:0, N:0, S:0, T:0, F:0, J:0, P:0 };

    const roasts = {
        "INTJ": "คุณเป็นคนที่มีวิสัยทัศน์เฉียบคมและวางแผนเก่งมาก... แต่น่าเสียดายที่คุณมักใช้สมองระดับอัจฉริยะนั้นไปกับการดูถูกคนอื่นในใจ และสร้างกำแพงอีโก้ขึ้นมาปิดบังความจริงที่ว่าคุณแค่เข้าสังคมไม่เป็น",
        "INFJ": "คุณมีความเห็นอกเห็นใจที่ลึกซึ้งและมองโลกในแง่มุมที่คนอื่นมองไม่เห็น... แต่ความใจดีของคุณมันมักจะมาพร้อมกับอาการ 'แบกโลก' ที่ไม่มีใครขอ แถมยังชอบมโนไปเองว่าคนอื่นไม่มีทางเข้าใจความซับซ้อนของคุณ",
        "INTP": "คุณคือยอดนักคิดที่สามารถย่อยตรรกะยากๆ ให้เข้าใจง่ายได้เสมอ... เสียอย่างเดียวคือคุณมักจะเก่งแต่ในหัว แต่ในชีวิตจริงคุณคือยอดนักดองงานที่ใช้ตรรกะมาเป็นข้ออ้างในการขี้เกียจไปวันๆ",
        "INFP": "คุณมีโลกภายในที่สวยงามและยึดมั่นในอุดมการณ์อย่างแรงกล้า... แต่บางทีความอ่อนไหวของคุณมันก็ล้นจนกลายเป็นความเอาแต่ใจ คุณชอบเอาความรู้สึกตัวเองเป็นศูนย์กลางจักรวาลจนลืมมองความเป็นจริง",
        "ISTJ": "คุณเป็นคนที่พึ่งพาได้มากที่สุด มีระเบียบวินัยเป็นเลิศ... แต่ความเป๊ะของคุณมันจืดชืดจนน่าเบื่อ คุณเหมือนหุ่นยนต์ที่เดินตามคู่มือเก่าๆ จนขาดจินตนาการและไม่กล้าก้าวออกจากกรอบเดิมๆ แม้แต่นิดเดียว",
        "ISFJ": "ความใส่ใจและดูแลเอาใจใส่คนรอบข้างของคุณคือเรื่องที่น่าประทับใจ... แต่ลึกๆ แล้วคุณแค่เสพติดการเป็นที่ต้องการ คุณยอมทำให้คนอื่นจนตัวเองลำบากเพื่อจะเอามาใช้เป็นแต้มต่อทางอารมณ์ให้คนอื่นรู้สึกผิดทีหลัง",
        "ISTP": "คุณเก่งเรื่องการแก้ปัญหาเฉพาะหน้าและมีไหวพริบที่เป็นธรรมชาติ... แต่ความนิ่งของคุณมันคือความเย็นชาที่ไร้ความรับผิดชอบต่อความรู้สึกคนอื่น คุณเลือกจะเงียบเพราะคุณขี้เกียจจัดการปัญหา ไม่ใช่เพราะคุณเท่",
        "ISFP": "คุณเป็นศิลปินที่มีสุนทรียภาพและรักอิสระอย่างแท้จริง... แต่ความอิสระของคุณมันมักจะเป็นแค่คำสวยๆ ที่ใช้เรียกความไม่มีวินัย คุณไหลไปตามอารมณ์ชั่ววูบจนคนรอบข้างตามไม่ทันและพึ่งพาอะไรไม่ได้เลย",
        "ENTJ": "ความเป็นผู้นำและความเด็ดขาดของคุณสามารถขับเคลื่อนองค์กรได้เยี่ยม... แต่น่ากลัวตรงที่คุณมองคนรอบข้างเป็นแค่เครื่องมือมุ่งสู่ความสำเร็จ คุณพร้อมจะเหยียบทุกคนเพื่อให้ตัวเองไปถึงจุดหมายโดยไม่สนหัวใคร",
        "ENFJ": "คุณมีเสน่ห์ดึงดูดและสามารถสร้างแรงบันดาลใจให้คนรอบข้างได้อย่างดี... แต่ความหวังดีของคุณมันมักแฝงไปด้วยการบงการ คุณพยายามเปลี่ยนคนอื่นให้เป็นอย่างที่คุณต้องการภายใต้หน้ากากของคำว่า 'อยากให้ได้ดี'",
        "ENTP": "คุณมีความคิดสร้างสรรค์ที่พรั่งพรูและกล้าที่จะท้าทายสิ่งใหม่ๆ... แต่คุณมันพวกดีแต่พูด ไอเดียร้อยแปดของคุณมักจบลงที่การเถียงชนะคนอื่นเพื่อความสะใจ แต่ไม่เคยมีชิ้นงานไหนที่ทำสำเร็จเป็นชิ้นเป็นอันจริงๆ",
        "ENFP": "พลังงานและรอยยิ้มของคุณทำให้โลกสดใสและน่าอยู่ขึ้นเยอะ... แต่ความสดใสนี้มันมักจะกลบเกลื่อนความสับสนที่คุณจัดการไม่ได้ คุณวิ่งหาความตื่นเต้นไปทั่วเพื่อหนีจากความรับผิดชอบที่ผู้ใหญ่เขาทำกัน",
        "ESTJ": "ความสามารถในการจัดการและคุมสถานการณ์ของคุณเป็นสิ่งที่น่าทึ่ง... แต่ความมั่นใจนั้นมันทำให้คุณกลายเป็นจอมบงการที่น่ารำคาญ คุณชอบยัดเยียดมาตรฐานตัวเองให้คนอื่นและคิดว่าใครที่ไม่ทำตามคือคนโง่",
        "ESFJ": "คุณเป็นศูนย์กลางของกลุ่มที่คอยสร้างความสมัครสมานสามัคคี... แต่ความใจดีของคุณมันมาพร้อมกับการชอบจิกกัดและตัดสินคนอื่นที่อยู่นอกกรอบสังคม คุณทนไม่ได้ถ้าไม่มีใครสนใจหรือยอมรับในสิ่งที่คุณอวด",
        "ESTP": "ความกล้าหาญและพลังงานในการลงมือทำของคุณคือจุดแข็งที่หาตัวจับยาก... แต่คุณมันพวกบุ่มบ่ามไร้สติ คุณใช้ชีวิตเหมือนอยู่ในหนังแอคชั่นตลอดเวลาเพื่อหนีความว่างเปล่าข้างใน จนบางครั้งความสนุกของคุณก็สร้างภาระให้คนอื่น",
        "ESFP": "รอยยิ้มและความสนุกสนานของคุณคือจิตวิญญาณของทุกปาร์ตี้... แต่ความร่าเริงนี้มันช่างฉาบฉวย คุณเสพติดแสงไฟเพราะกลัวความโดดเดี่ยว และมักจะใช้ความตลกกลบเกลื่อนความล้มเหลวในการจัดการชีวิตตัวเอง"
    };

    function startQuiz() {
        // Shuffle คำถามเพื่อให้ไม่จำเจ
        allQuestions.sort(() => Math.random() - 0.5); 
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        if (current >= allQuestions.length) { renderResult(); return; }
        const q = allQuestions[current];
        document.getElementById('q-progress').innerText = `ANALYZING STEP ${current + 1} OF 12`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('optA').innerText = q.a;
        document.getElementById('optB').innerText = q.b;
    }

    // แก้ไข Logic ตรงนี้: ใช้ axis แทนการหาในวงเล็บ
    function handleAnswer(choice) {
        const q = allQuestions[current];
        const axis = q.axis; // เช่น "NS"
        
        if (choice === 'A') {
            // เลือกคำตอบแรก (ตัวอักษรตัวแรกของ axis เช่น N)
            scores[axis[0]]++;
        } else {
            // เลือกคำตอบสอง (ตัวอักษรตัวที่สองของ axis เช่น S)
            scores[axis[1]]++;
        }
        
        current++;
        renderQuestion();
    }

    function renderResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let type = "";
        type += scores.E >= scores.I ? "E" : "I";
        type += scores.N >= scores.S ? "N" : "S";
        type += scores.T >= scores.F ? "T" : "F";
        type += scores.J >= scores.P ? "J" : "P";
        
        document.getElementById('res-type').innerText = type;
        document.getElementById('res-roast').innerText = roasts[type];
    }
</script>
</body>
</html>
