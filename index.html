<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>The Slicer 16 | Ultimate Logic</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ffcc; --text: #f0f0f0; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 600px; background: var(--card); padding: 30px; border: 1px solid #222; border-radius: 5px; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        .progress-container { width: 100%; height: 2px; background: #222; margin-bottom: 25px; }
        #progress-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; text-align: left; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .question-box { display: none; }
        .question-box.active { display: block; animation: slideIn 0.3s ease; }
        #result { display: none; text-align: center; }
        .type-title { font-size: 2.5rem; color: var(--accent); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0,255,204,0.5); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="app">
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div id="q1" class="question-box active">
        <p>> การชาร์จพลังงานของคุณมาจากไหน?</p>
        <button class="btn" onclick="select('E')">A: การออกไปเจอผู้คน/สภาพแวดล้อมใหม่ๆ (Extravert)</button>
        <button class="btn" onclick="select('I')">B: การอยู่กับตัวเองในพื้นที่ส่วนตัว (Introvert)</button>
    </div>

    <div id="q2" class="question-box">
        <p>> คุณประมวลผลข้อมูลแบบไหน?</p>
        <button class="btn" onclick="select('N')">A: มองภาพรวม วิสัยทัศน์ และความเป็นไปได้ (Intuition)</button>
        <button class="btn" onclick="select('S')">B: มองข้อเท็จจริง ประสบการณ์ และรายละเอียด (Sensing)</button>
    </div>

    <div id="q3" class="question-box">
        <p>> คุณตัดสินใจด้วยอะไรเป็นหลัก?</p>
        <button class="btn" onclick="select('T')">A: ตรรกะ เหตุผล และความถูกต้อง (Thinking)</button>
        <button class="btn" onclick="select('F')">B: ความรู้สึก ค่านิยม และความเข้าอกเข้าใจ (Feeling)</button>
    </div>

    <div id="q4" class="question-box">
        <p>> รูปแบบการใช้ชีวิตของคุณเป็นอย่างไร?</p>
        <button class="btn" onclick="select('J')">A: มีแบบแผน ชัดเจน และชอบข้อสรุป (Judging)</button>
        <button class="btn" onclick="select('P')">B: ยืดหยุ่น ไหลตามสถานการณ์ และเปิดรับสิ่งใหม่ (Perceiving)</button>
    </div>

    <div id="result">
        <div style="font-size: 0.8rem; color: var(--dim);">[ ANALYSIS_VERDICT ]</div>
        <div class="type-title" id="final-type">---</div>
        <div id="auth-tag" style="font-weight: bold;"></div>
        <p id="desc" style="margin-top: 20px; line-height: 1.6; color: #ccc;"></p>
        <button class="btn" style="text-align: center; margin-top: 30px;" onclick="location.reload()">RE-CALIBRATE</button>
    </div>
</div>

<script>
    let userType = "";
    let step = 1;
    let timer;
    let startTimestamp;
    let totalAuthenticity = 100;

    function startTimer() {
        let timeLeft = 100;
        startTimestamp = Date.now();
        timer = setInterval(() => {
            timeLeft -= 1.5; // ประมาณ 6-7 วินาทีต่อข้อ
            document.getElementById('progress-bar').style.width = timeLeft + "%";
            if (timeLeft <= 0) { clearInterval(timer); select('Late'); }
        }, 100);
    }

    function select(choice) {
        clearInterval(timer);
        let timeUsed = (Date.now() - startTimestamp) / 1000;
        
        // ตรรกะจับลังเล: ถ้าคิดนานเกิน 3.5 วินาทีต่อข้อ หักคะแนนความมั่นใจ
        if (timeUsed > 3.5 || choice === 'Late') {
            totalAuthenticity -= 25;
        }

        if (choice !== 'Late') userType += choice;
        else userType += "X"; // X หมายถึงระบุไม่ได้เพราะลังเลเกินไป

        document.getElementById(`q${step}`).classList.remove('active');
        step++;

        if (step <= 4) {
            document.getElementById(`q${step}`).classList.add('active');
            startTimer();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.querySelector('.progress-container').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        // ถ้าตอบไม่ทันหรือลังเลจนได้ X
        let finalType = userType.includes("X") ? "UNCLEAR" : userType;
        document.getElementById('final-type').innerText = finalType;

        const authTag = document.getElementById('auth-tag');
        if (totalAuthenticity >= 75) {
            authTag.innerText = "[ STATUS: PURE_ORIGINAL ]";
            authTag.style.color = "var(--accent)";
        } else {
            authTag.innerText = "[ STATUS: MASKED_OR_HESITATED ]";
            authTag.style.color = "#ff4d4d";
        }

        let description = `ระบบตรวจพบว่าคุณมีลักษณะการใช้ชีวิตแบบ ${finalType}. `;
        if (totalAuthenticity < 75) {
            description += "อย่างไรก็ตาม ความล่าช้าในการตอบสนองบ่งบอกว่าคุณกำลังใช้ 'สมองส่วนคิด' เพื่อปรุงแต่งคำตอบ มากกว่าการใช้ 'สัญชาตญาณ' (Mistype Risk High).";
        } else {
            description += "ความเร็วในการประมวลผลของคุณอยู่ในเกณฑ์เสถียร ยืนยันว่านี่คือตัวตนที่แท้จริงของคุณในปัจจุบัน.";
        }
        document.getElementById('desc').innerText = description;
    }

    startTimer();
</script>
</body>
</html>
