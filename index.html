<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Core Filter | Final Release</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 500px; text-align: center; padding: 20px; }
        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; font-size: 1.1rem; cursor: pointer; border-radius: 8px; text-align: left; }
        .btn:hover { border-color: #bb86fc; background: #1a1a1a; }
        .hidden { display: none; }
        h2 { font-size: 1.4rem; line-height: 1.5; margin-bottom: 25px; text-align: left; }
        #result-screen { border: 2px solid #bb86fc; padding: 30px; border-radius: 15px; background: #0a0a0a; }
        .type-tag { font-size: 3rem; color: #bb86fc; font-weight: bold; margin: 10px 0; }
        .desc { font-size: 1.1rem; color: #ccc; line-height: 1.6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <h1 style="letter-spacing: 5px;">CORE FILTER</h1>
        <p style="color:#888">เจาะลึกเลนส์ที่คุณใช้มองโลก</p>
        <button class="btn" style="text-align:center" onclick="startQuiz()">เริ่มการทดสอบ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="q-text">คำถาม</h2>
        <div id="options">
            <button class="btn" onclick="handleAnswer('A')" id="optA"></button>
            <button class="btn" onclick="handleAnswer('B')" id="optB"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div style="font-size: 0.9rem; color: #888;">เนื้อแท้ของคุณคือ</div>
        <div id="res-type" class="type-tag"></div>
        <p id="res-desc" class="desc"></p>
        <div id="res-truth" style="color: #ff0266; font-weight: bold; border-top: 1px solid #333; padding-top: 20px;"></div>
        <button class="btn" style="text-align:center; margin-top:30px; border-color:#444" onclick="location.reload()">ทดสอบใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    // ชุดคำถามที่ครอบคลุม 4 แกนหลัก (E/I, N/S, T/F, J/P)
    const questions = [
        { q: "คุณชาร์จพลังงานด้วยวิธีไหน?", a: "ออกไปเจอโลกและผู้คน (E)", b: "อยู่เงียบๆ กับความคิดตัวเอง (I)" },
        { q: "เวลาประมวลผลข้อมูล คุณเชื่ออะไร?", a: "สัญชาตญาณและภาพรวม (N)", b: "รายละเอียดและข้อเท็จจริง (S)" },
        { q: "เวลาตัดสินใจ คุณใช้อะไรนำทาง?", a: "ตรรกะและความสมเหตุสมผล (T)", b: "ความรู้สึกและความเห็นอกเห็นใจ (F)" },
        { q: "คุณชอบใช้ชีวิตแบบไหนมากกว่า?", a: "วางแผนไว้ล่วงหน้าชัดเจน (J)", b: "ยืดหยุ่น ปรับไปตามหน้างาน (P)" }
    ];

    let current = 0;
    let results = { E:0, I:0, N:0, S:0, T:0, F:0, J:0, P:0 };

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        if (current >= questions.length) {
            renderResult();
            return;
        }
        const q = questions[current];
        document.getElementById('q-text').innerText = (current + 1) + ". " + q.q;
        document.getElementById('optA').innerText = q.a;
        document.getElementById('optB').innerText = q.b;
    }

    function handleAnswer(choice) {
        const q = questions[current];
        const selected = choice === 'A' ? q.a : q.b;
        const letter = selected.match(/\((.)\)/)[1];
        
        results[letter]++;
        current++;
        renderQuestion();
    }

    function renderResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        // สรุปไทป์จากแต้ม
        let type = "";
        type += results.E >= results.I ? "E" : "I";
        type += results.N >= results.S ? "N" : "S";
        type += results.T >= results.F ? "T" : "F";
        type += results.J >= results.P ? "J" : "P";

        const typeInfo = {
            "INTJ": { desc: "นักวางกลยุทธ์ผู้มองการณ์ไกล", truth: "ทนไม่ได้กับความไม่สมเหตุสมผล" },
            "INFJ": { desc: "ผู้หยั่งรู้ที่มีอุดมการณ์แรงกล้า", truth: "ทนไม่ได้กับการฉาบฉวยและไร้ความหมาย" },
            "INTP": { desc: "นักคิดวิเคราะห์ผู้รักความถูกต้อง", truth: "ทนไม่ได้กับตรรกะวิบัติ" },
            "INFP": { desc: "นักฝันผู้ซื่อสัตย์ต่อจิตวิญญาณ", truth: "ทนไม่ได้กับการต้องสวมหน้ากาก" },
            "ISTJ": { desc: "ผู้รักษาความถูกต้องและระเบียบวินัย", truth: "ทนไม่ได้กับความสะเพร่า" },
            "ISFJ": { desc: "ผู้พิทักษ์ที่ใส่ใจทุกรายละเอียด", truth: "ทนไม่ได้กับการอกตัญญู" },
            "ISTP": { desc: "นักประดิษฐ์ผู้เงียบขรึมและสมจริง", truth: "ทนไม่ได้กับการถูกบงการ" },
            "ISFP": { desc: "ศิลปินผู้รักอิสระและปัจจุบันกาล", truth: "ทนไม่ได้กับการถูกจำกัดตัวตน" },
            "ENTJ": { desc: "ผู้นำผู้เด็ดขาดและบ้าพลัง", truth: "ทนไม่ได้กับความขี้เกียจ" },
            "ENFJ": { desc: "ผู้สร้างแรงบันดาลใจให้มวลชน", truth: "ทนไม่ได้กับการเห็นคนถูกทอดทิ้ง" },
            "ENTP": { desc: "นักโต้วาทีผู้ทลายกรอบเดิมๆ", truth: "ทนไม่ได้กับความน่าเบื่อซ้ำซาก" },
            "ENFP": { desc: "นักสร้างสรรค์ผู้จุดประกายความเป็นไปได้", truth: "ทนไม่ได้กับการถูกขังในกรอบ" },
            "ESTJ": { desc: "ผู้บริหารที่เน้นผลลัพธ์และความจริง", truth: "ทนไม่ได้กับความไร้ประสิทธิภาพ" },
            "ESFJ": { desc: "ผู้ดูแลสังคมและสร้างมิตรภาพ", truth: "ทนไม่ได้กับการถูกมองข้าม" },
            "ESTP": { desc: "นักลุยที่กล้าได้กล้าเสีย", truth: "ทนไม่ได้กับการนั่งรอเฉยๆ" },
            "ESFP": { desc: "ผู้สร้างความบันเทิงและพลังบวก", truth: "ทนไม่ได้กับบรรยากาศที่ตึงเครียด" }
        };

        document.getElementById('res-type').innerText = type;
        document.getElementById('res-desc').innerText = typeInfo[type].desc;
        document.getElementById('res-truth').innerText = "CORE TRUTH: " + typeInfo[type].truth;
    }
</script>

</body>
</html>
</html>
